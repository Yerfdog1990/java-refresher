spring:
  application:
    name: auth-server

  datasource:
    username: sa
    url: jdbc:h2:mem:testdb;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=VALUE;LOCK_TIMEOUT=10000

server:
  port: 8083

keycloak:
  enabled: true
  server:
    contextPath: /auth
    adminUser:
      username: bael-admin
      password: pass
    realmImportFile: baeldung-realm.json
  hostname:
    provider: fixed
    fixed:
      hostname: localhost
      httpPort: 8083
      httpsPort: -1
      alwaysHttps: false