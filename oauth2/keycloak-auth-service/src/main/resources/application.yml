spring:
  application:
    name: keycloak-auth-service
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${app.keycloak.serverUrl}/realms/${app.keycloak.realm}
          jwk-set-uri: ${app.keycloak.serverUrl}/realms/${app.keycloak.realm}/protocol/openid-connect/certs
          audiences: keycloak-auth-service
server:
  port: 8081
  servlet:
    context-path: /auth
app:
  keycloak:
    admin:
      clientId: admin-cli
      clientSecret: yXUoEoYNqiNqJriyEOXAcakQ2sY7sdXy
    realm: Yerfdog
    serverUrl: http://localhost:9082
